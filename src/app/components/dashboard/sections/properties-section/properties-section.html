<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-light text-stone-900">Mes biens</h1>
    <p class="text-stone-500 text-sm mt-1">{{ properties.length }} biens publiés</p>
  </div>
  <a routerLink="/publish" class="flex items-center gap-2 px-5 py-2.5 bg-amber-800 text-white text-sm font-medium hover:bg-amber-700 transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
    Publier un nouveau bien
  </a>
</div>

<div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-5">
  @for (p of properties; track p.id) {
    <div class="bg-white border border-stone-200 hover:border-amber-400 hover:shadow-md transition-all duration-200">
      <div class="relative h-40 overflow-hidden">
        <img [src]="p.coverPhoto" [alt]="p.title" class="w-full h-full object-cover">
        <div class="absolute top-3 right-3">
          <span class="text-xs px-2 py-1 border bg-white" [class]="getStatusClass(p.status)">{{ getStatusLabel(p.status) }}</span>
        </div>
      </div>
      <div class="p-4">
        <div class="flex items-start justify-between gap-2 mb-1">
          <h3 class="font-medium text-stone-900 text-sm">{{ p.title }}</h3>
          <span class="text-xs text-stone-500 bg-stone-100 px-2 py-0.5 flex-shrink-0">{{ p.type }}</span>
        </div>
        <p class="text-xs text-stone-500 mb-2">{{ p.district }}, {{ p.city }}</p>
        <div class="flex items-center justify-between">
          <span class="font-semibold text-amber-800 text-sm">{{ formatPrice(p.price) }} CFA/mois</span>
          @if (p.tenantName) {
            <span class="text-xs text-stone-500">{{ p.tenantName }}</span>
          }
        </div>
        <div class="flex gap-2 mt-3">
          <button class="flex-1 py-1.5 text-xs border border-stone-200 text-stone-600 hover:border-amber-400 transition-colors">Modifier</button>
          <button class="flex-1 py-1.5 text-xs border border-amber-800 text-amber-800 hover:bg-amber-800 hover:text-white transition-all duration-200">Voir annonce</button>
        </div>
      </div>
    </div>
  }
</div>
