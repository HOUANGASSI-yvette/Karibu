  <aside class="hidden sidebar overflow-y-auto lg:flex flex-col w-56 bg-white border-r border-stone-200 pt-6 pb-8 sticky top-16 h-[calc(100vh-64px)] flex-shrink-0">

    <div class="px-4 mb-6">
      <p class="text-xs font-medium text-stone-400 uppercase tracking-widest">Navigation</p>
    </div>

    <nav class="flex-1 px-2 space-y-0.5">

      <button (click)="setSection('overview')"
              [class]="activeSection === 'overview'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
          : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Vue d'ensemble
      </button>

      <button (click)="setSection('properties')"
              [class]="activeSection === 'properties'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
          : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        Mes biens
        <span class="ml-auto text-xs bg-stone-100 text-stone-600 px-1.5 py-0.5">{{ propertiesCount }}</span>
      </button>

      <button (click)="setSection('tenants')"
              [class]="activeSection === 'tenants'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
          : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Locataires
        <span class="ml-auto text-xs bg-stone-100 text-stone-600 px-1.5 py-0.5">{{ tenantsCount }}</span>
      </button>

      <button (click)="setSection('payments')"
              [class]="activeSection === 'payments'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
          : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        Paiements
      </button>

      <button (click)="setSection('messages')"
              [class]="activeSection === 'messages'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
          : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        Messages
        @if (unreadCount > 0) {
          <span class="ml-auto text-xs bg-amber-800 text-white px-1.5 py-0.5 font-bold">{{ unreadCount }}</span>
        }
      </button>

      <button (click)="setSection('requests')"
              [class]="activeSection === 'requests'
          ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
          : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Demandes
        @if (pendingCount > 0) {
          <span class="ml-auto text-xs bg-amber-800 text-white px-1.5 py-0.5 font-bold">{{ pendingCount }}</span>
        }
      </button>

      <!-- Section admin — visible uniquement pour les admins -->
      @if (isAdmin) {
        <div class="px-4 mt-5 mb-2">
          <p class="text-xs font-medium text-stone-400 uppercase tracking-widest">Administration</p>
        </div>

        <button (click)="setSection('admin-users')"
                [class]="activeSection === 'admin-users'
      ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
      : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Utilisateurs
        </button>

        <button (click)="setSection('admin-documents')"
                [class]="activeSection === 'admin-documents'
      ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
      : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Documents
        </button>

        <button (click)="setSection('admin-proprietaires')"
                [class]="activeSection === 'admin-proprietaires'
      ? 'w-full flex items-center gap-3 px-3 py-2.5 bg-amber-50 border-l-2 border-amber-800 text-amber-800 text-sm font-medium'
      : 'w-full flex items-center gap-3 px-3 py-2.5 text-stone-600 text-sm hover:bg-stone-50 hover:text-stone-900 transition-colors'">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          Propriétaires
        </button>
      }

    </nav>

    <div class="px-4 mt-4">
      <a routerLink="/publish" class="w-full py-2.5 bg-amber-800 text-white text-sm font-medium hover:bg-amber-700 transition-colors flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
        Publier un bien
      </a>
    </div>
    <div class="px-4 mt-2">
      <a routerLink="/"
         class="w-full py-2 border border-stone-200 text-stone-500 text-sm hover:border-stone-400 hover:text-stone-700 transition-colors flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Retour au site
      </a>
    </div>

  </aside>
