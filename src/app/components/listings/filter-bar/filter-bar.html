<div class="bg-white border-b border-stone-200 sticky top-[65px] z-20 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Desktop -->
    <div class="hidden md:flex items-center gap-3 py-3 flex-wrap">

      <!-- Ville -->
      <select [(ngModel)]="selectedCity" (ngModelChange)="onFilterChange()"
              class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all">
        <option value="">Toutes les villes</option>
        @for (city of cities; track city) {
          <option [value]="city">{{ city }}</option>
        }
      </select>

      <!-- Type -->
      <select [(ngModel)]="selectedType" (ngModelChange)="onFilterChange()"
              class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all">
        <option value="">Tous les types</option>
        @for (t of propertyTypes; track t.value) {
          <option [value]="t.value">{{ t.label }}</option>
        }
      </select>

      <!-- Prix -->
      <select [(ngModel)]="selectedPriceIndex" (ngModelChange)="onFilterChange()"
              class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all">
        @for (range of priceRanges; track $index) {
          <option [value]="$index">{{ range.label }}</option>
        }
      </select>

      <!-- Disponible uniquement -->
      <label class="flex items-center gap-2 text-sm text-stone-600 cursor-pointer select-none">
        <input type="checkbox" [(ngModel)]="availableOnly" (ngModelChange)="onFilterChange()"
               class="w-4 h-4 accent-amber-800">
        Disponible uniquement
      </label>

      <!-- Résultats + reset -->
      <div class="ml-auto flex items-center gap-3">
        @if (!isLoading) {
          <span class="text-sm text-stone-500">
            <span class="font-medium text-stone-900">{{ resultCount }}</span>
            logement{{ resultCount > 1 ? 's' : '' }}
          </span>
        }
        @if (activeFilterCount > 0) {
          <button (click)="resetFilters()"
                  class="text-xs text-amber-800 border border-amber-300 px-3 py-1.5 hover:bg-amber-50 transition-colors">
            Effacer les filtres ({{ activeFilterCount }})
          </button>
        }
      </div>

    </div>

    <!-- Mobile -->
    <div class="md:hidden flex items-center justify-between py-3">
      <button (click)="showMobileFilters = !showMobileFilters"
              class="flex items-center gap-2 text-sm border border-stone-200 px-4 py-2 hover:border-amber-400 transition-colors">
        <svg class="w-4 h-4 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M3 4h18M7 12h10M11 20h2"/>
        </svg>
        Filtres
        @if (activeFilterCount > 0) {
          <span class="w-5 h-5 bg-amber-800 text-white text-xs flex items-center justify-center font-bold">
            {{ activeFilterCount }}
          </span>
        }
      </button>
      <span class="text-sm text-stone-500">
        <span class="font-medium text-stone-900">{{ resultCount }}</span>
        logement{{ resultCount > 1 ? 's' : '' }}
      </span>
    </div>

    <!-- Panneau mobile déroulant -->
    @if (showMobileFilters) {
      <div class="md:hidden border-t border-stone-100 py-4 space-y-3">
        <select [(ngModel)]="selectedCity" (ngModelChange)="onFilterChange()"
                class="w-full border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400">
          <option value="">Toutes les villes</option>
          @for (city of cities; track city) {
            <option [value]="city">{{ city }}</option>
          }
        </select>

        <select [(ngModel)]="selectedType" (ngModelChange)="onFilterChange()"
                class="w-full border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400">
          <option value="">Tous les types</option>
          @for (t of propertyTypes; track t.value) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>

        <select [(ngModel)]="selectedPriceIndex" (ngModelChange)="onFilterChange()"
                class="w-full border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400">
          @for (range of priceRanges; track $index) {
            <option [value]="$index">{{ range.label }}</option>
          }
        </select>

        <label class="flex items-center gap-2 text-sm text-stone-600 cursor-pointer">
          <input type="checkbox" [(ngModel)]="availableOnly" (ngModelChange)="onFilterChange()"
                 class="w-4 h-4 accent-amber-800">
          Disponible uniquement
        </label>

        @if (activeFilterCount > 0) {
          <button (click)="resetFilters()"
                  class="w-full py-2 text-sm text-amber-800 border border-amber-300 hover:bg-amber-50 transition-colors">
            Effacer les filtres
          </button>
        }
      </div>
    }

  </div>
</div>
