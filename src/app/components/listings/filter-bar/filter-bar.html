<!-- ============================================================ -->
<!-- TEMPLATE : FilterBarComponent                               -->
<!-- Barre de filtres sticky en haut de la page listings        -->
<!-- ============================================================ -->

<!-- ── Barre desktop ── -->
<div class="bg-white border-b border-stone-200 sticky top-0 z-20 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">

    <!-- Ligne haute : recherche + bouton mobile -->
    <div class="flex items-center gap-3 mb-3">

      <!-- Recherche texte libre -->
      <!-- ⚠️ API: query param "search" → GET /properties?search=... -->
      <div class="relative flex-1 max-w-sm">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onFilterChange()"
          placeholder="Rechercher (piscine, meublé…)"
          class="w-full pl-9 pr-4 py-2.5 border border-stone-200 bg-stone-50 text-sm text-stone-900 placeholder:text-stone-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-all duration-200">
      </div>

      <!-- Résultats -->
      <span class="text-sm text-stone-500 hidden md:block">
        <span class="font-semibold text-stone-900">{{ resultCount }}</span>
        {{ resultCount > 1 ? 'logements' : 'logement' }}
      </span>

      <!-- Bouton filtres mobile -->
      <button
        (click)="showMobileFilters = !showMobileFilters"
        class="md:hidden flex items-center gap-2 px-4 py-2.5 border border-stone-200 text-sm text-stone-700 hover:border-amber-400 transition-colors relative">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M3 4h18M6 12h12M10 20h4"/>
        </svg>
        Filtres
        @if (activeFilterCount > 0) {
          <span class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-amber-800 text-white text-xs flex items-center justify-center font-bold">
            {{ activeFilterCount }}
          </span>
        }
      </button>

      <!-- Reset (desktop) -->
      @if (activeFilterCount > 0) {
        <button (click)="resetFilters()" class="hidden md:flex items-center gap-1.5 text-xs text-amber-800 hover:underline">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path d="M6 18L18 6M6 6l12 12"/>
          </svg>
          Réinitialiser
        </button>
      }
    </div>

    <!-- Ligne filtres desktop -->
    <div class="hidden md:flex items-center gap-3 flex-wrap">

      <!-- Filtre : Ville -->
      <!-- ⚠️ API: query param "city" → GET /properties?city=Lomé -->
      <select
        [(ngModel)]="filters.city"
        (change)="onFilterChange()"
        class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all duration-200 appearance-none pr-8 min-w-[130px]">
        <option [ngValue]="undefined">Toutes les villes</option>
        @for (city of cities; track city) {
          <option [value]="city">{{ city }}</option>
        }
      </select>

      <!-- Filtre : Type de bien -->
      <!-- ⚠️ API: query param "type" → GET /properties?type=studio -->
      <select
        [(ngModel)]="filters.type"
        (change)="onFilterChange()"
        class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all duration-200 appearance-none pr-8 min-w-[130px]">
        <option [ngValue]="undefined">Tous les types</option>
        @for (type of propertyTypes; track type[0]) {
          <option [value]="type[0]">{{ type[1] }}</option>
        }
      </select>

      <!-- Filtre : Tranche de prix -->
      <!-- ⚠️ API: query params "priceMin" et "priceMax" -->
      <select
        [(ngModel)]="selectedPriceIndex"
        (change)="onFilterChange()"
        class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all duration-200 appearance-none pr-8 min-w-[190px]">
        @for (range of priceRanges; track $index) {
          <option [value]="$index">{{ range.label }}</option>
        }
      </select>

      <!-- Filtre : Nombre de pièces minimum -->
      <!-- ⚠️ API: query param "roomsMin" → GET /properties?roomsMin=2 -->
      <select
        [(ngModel)]="filters.roomsMin"
        (change)="onFilterChange()"
        class="border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-700 focus:outline-none focus:border-amber-400 focus:bg-white transition-all duration-200 appearance-none pr-8 min-w-[130px]">
        <option [ngValue]="undefined">Nb de pièces</option>
        <option [value]="1">1+ pièce</option>
        <option [value]="2">2+ pièces</option>
        <option [value]="3">3+ pièces</option>
        <option [value]="4">4+ pièces</option>
      </select>

      <!-- Filtre : Disponible uniquement -->
      <!-- ⚠️ API: query param "available=true" -->
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <div
          (click)="filters.available = filters.available ? undefined : true; onFilterChange()"
          [class]="filters.available
            ? 'w-4 h-4 bg-amber-800 border border-amber-800 flex items-center justify-center'
            : 'w-4 h-4 border border-stone-300 hover:border-amber-400 transition-colors'">
          @if (filters.available) {
            <svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 12 12">
              <path d="M1 6l3.5 3.5L11 2"/>
            </svg>
          }
        </div>
        <span class="text-sm text-stone-600">Disponible maintenant</span>
      </label>

    </div>
  </div>
</div>

<!-- ── Panneau filtres mobile ── -->
@if (showMobileFilters) {
  <div class="md:hidden bg-white border-b border-stone-200 px-4 pb-5 space-y-4">

    <select [(ngModel)]="filters.city" (change)="onFilterChange()" class="w-full border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400 appearance-none">
      <option [ngValue]="undefined">Toutes les villes</option>
      @for (city of cities; track city) {
        <option [value]="city">{{ city }}</option>
      }
    </select>

    <select [(ngModel)]="filters.type" (change)="onFilterChange()" class="w-full border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400 appearance-none">
      <option [ngValue]="undefined">Tous les types</option>
      @for (type of propertyTypes; track type[0]) {
        <option [value]="type[0]">{{ type[1] }}</option>
      }
    </select>

    <select [(ngModel)]="selectedPriceIndex" (change)="onFilterChange()" class="w-full border border-stone-200 bg-stone-50 px-3 py-2.5 text-sm focus:outline-none focus:border-amber-400 appearance-none">
      @for (range of priceRanges; track $index) {
        <option [value]="$index">{{ range.label }}</option>
      }
    </select>

    <div class="flex gap-3">
      <button (click)="resetFilters(); showMobileFilters = false" class="flex-1 py-2.5 border border-stone-200 text-sm text-stone-700">Réinitialiser</button>
      <button (click)="showMobileFilters = false" class="flex-1 py-2.5 bg-amber-800 text-white text-sm font-medium">Appliquer</button>
    </div>

  </div>
}
